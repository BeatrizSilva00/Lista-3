<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soma dos números</title>
</head>
<body>
    <script>
        let N = parseInt(prompt("Digite um número positivo:"));
        let soma = 0;

        for (let i = 1; i <= N; i++) {
        soma += i;
        }

        alert("Soma = " + soma);
    </script>
    <h1>Soma dos números</h1>
    <a href="index.html"><button>voltar</button></a>
</body>
</html>
