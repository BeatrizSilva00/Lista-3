<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fatorial</title>
</head>
<body>
    <script>
        let num = parseInt(prompt("Digite um número:"));
        let fatorial = 1;

        for (let i = num; i >= 1; i--) {
        fatorial *= i;
        }

        alert("Fatorial = " + fatorial);
    </script>

</body>
