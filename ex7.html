<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fibonacci</title>
</head>
<body>
    <script>
        let a = 0;
        let b = 1;

        alert(a);
        alert(b);

        for (let i = 3; i <= 10; i++) {
        let proximo = a + b;
        alert(proximo);

        a = b;
        b = proximo;
        }
    </script>
    <h1>Fibonacci</h1>
    <a href="index.html"><button>voltar</button></a>
</body>
</html>
